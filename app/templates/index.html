<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAWA-786 Manual Control</title>
  <link rel="stylesheet" href="../static/index.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="title">BAWA-786</div>
      <div class="status-badge">MANUAL MODE</div>
    </div>

    <!-- Movement Controls -->
    <div class="section-title">Movement Control</div>
    <div class="movement-grid">
      <div></div>
      <button class="btn" onmousedown="move(0.5, 0.5)" onmouseup="stop()">Forward</button>
      <div></div>
      <button class="btn" onmousedown="move(0.5, -0.5)" onmouseup="stop()">Left</button>
      <button class="btn" onmousedown="stop()">Stop</button>
      <button class="btn" onmousedown="move(-0.5, 0.5)" onmouseup="stop()">Right</button>
      <div></div>
      <button class="btn" onmousedown="move(-0.5, -0.5)" onmouseup="stop()">Backward</button>
      <div></div>
    </div>

    <!-- Servo Arm Control -->
    <div class="section-title">Servo Arm Control</div>
    <div class="servo-section">
      <div class="servo-input">
        <label>Servo 1:</label>
        <input type="number" id="servo1" min="0" max="180" value="90">
        <button class="btn" onclick="moveServo(1)">Move</button>
      </div>
      <div class="servo-input">
        <label>Servo 2:</label>
        <input type="number" id="servo2" min="0" max="180" value="90">
        <button class="btn" onclick="moveServo(2)">Move</button>
      </div>
      <div class="servo-input">
        <label>Servo 3:</label>
        <input type="number" id="servo3" min="0" max="180" value="90">
        <button class="btn" onclick="moveServo(3)">Move</button>
      </div>
      <div class="servo-input">
        <label>Servo 4:</label>
        <input type="number" id="servo4" min="0" max="180" value="90">
        <button class="btn" onclick="moveServo(4)">Move</button>
      </div>
    </div>

    <!-- Valve Control -->
    <div class="section-title">Valve Control</div>
    <div class="valve-section">
      <div class="valve-buttons">
        <button class="btn btn-success" onclick="valve('on')"><span class="icon">✅</span> ON</button>
        <button class="btn btn-danger" onclick="valve('off')"><span class="icon">❌</span> OFF</button>
      </div>
      <div id="valve-status"></div>
    </div>

    <!-- Autonomous Mode Button -->
    <button type="button" class="autonomous-btn" onclick="goToAutonomousMode()"><span class="icon">🤖</span> SWITCH TO AUTONOMOUS MODE</button>

    <!-- Footer -->
    <div class="footer">COPYRIGHT 2025</div>
  </div>

  <script>
    function move(L, R) {
      fetch(`/move?L=${L}&R=${R}`);
    }
    function stop() {
      fetch(`/move?L=0&R=0`);
    }
    function moveServo(num) {
      const degrees = document.getElementById(`servo${num}`).value;
      fetch(`/servo?servo=${num}&degrees=${degrees}`);
    }
    function valve(state) {
      fetch(`/valve?state=${state}`)
        .then(r => r.json())
        .then(j => {
          const el = document.getElementById('valve-status');
          if (!el) return;
          if (j.ok) {
            el.textContent = `Valve ${state.toUpperCase()} command sent`;
          } else {
            el.textContent = `Error: ${j.error || 'unknown'}`;
            alert('Valve error: ' + (j.error || 'unknown'));
          }
        })
        .catch(err => {
          console.error('Valve request failed', err);
          alert('Valve request failed');
        });
    }

    function goToAutonomousMode() {
      const path = window.location.pathname.toLowerCase();
      const isTemplatePreview = path.includes('/templates/') || path.endsWith('.html');
      window.location.href = isTemplatePreview ? './autonomous.html' : '/autonomous';
    }
  </script>
</body>
</html>

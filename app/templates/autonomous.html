<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAWA-786 Autonomous Mode</title>
    <link rel="stylesheet" href="../static/autonomous.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <!-- <div class="settings-icon">⚙️</div> -->
            <div class="title">BAWA-786</div>
            <div class="status-badge">AI MODEL ACTIVE</div>
        </div>

        <!-- Control Buttons -->
        <div class="button-group">
            <button class="btn btn-secondary" id="startBtn"><span class="icon">▶️</span> START SCAN</button>
            <button class="btn btn-secondary" id="stopBtn"><span class="icon">⏹️</span> STOP SCAN</button>
        </div>

        <!-- Scan Status Message -->
        <div id="scanStatus" class="scan-status" style="display:none;">🔍 Searching for rust...</div>

        <!-- Emergency Stop -->
        <button class="btn btn-secondary" id="emergencyBtn"><span class="icon">🏠</span> RETURN TO BASE</button>

        <!-- Bottom Buttons -->
        <div class="button-bottom">
            <button class="btn btn-test" id="testBtn"><span class="icon">🧪</span> START TEST</button>
            <button class="btn btn-manual" id="manualBtn"><span class="icon">🎮</span> SWITCH TO MANUAL MODE</button>
        </div>
    </div>

    <script>
        document.getElementById('startBtn').addEventListener('click', () => {
            fetch('/start_scan').then(r => r.json()).then(d => console.log(d));
            document.getElementById('scanStatus').style.display = 'block';
        });

        document.getElementById('stopBtn').addEventListener('click', () => {
            fetch('/stop_scan').then(r => r.json()).then(d => console.log(d));
            document.getElementById('scanStatus').style.display = 'none';
        });

        document.getElementById('testBtn').addEventListener('click', () => {
            // Start test logic to be implemented
            console.log('Start test clicked');
        });

        document.getElementById('emergencyBtn').addEventListener('click', () => {
            fetch('/return_to_base').then(r => r.json()).then(d => console.log(d));
            document.getElementById('scanStatus').style.display = 'none';
        });

        document.getElementById('manualBtn').addEventListener('click', () => {
            goToManualMode();
        });

        function goToManualMode() {
            const path = window.location.pathname.toLowerCase();
            const isTemplatePreview = path.includes('/templates/') || path.endsWith('.html');
            window.location.href = isTemplatePreview ? './index.html' : '/';
        }
    </script>
</body>
</html>
